name: super_admin_panel
description: "Super Admin Panel for Egyptian Tourism E-Commerce Platform - Flutter Web"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # UI & Styling
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  data_table_2: ^2.5.10
  
  # State Management
  provider: ^6.1.1
  
  # Icons
  cupertino_icons: ^1.0.8
  iconsax: ^0.0.8
  
  # Charts
  fl_chart: ^0.65.0
  
  # Utilities
  intl: ^0.20.2
  http: ^1.2.1
  file_picker: ^6.1.1
  firebase_messaging: ^15.0.1
  flutter_local_notifications: ^17.2.1
  shimmer: ^3.0.0
  
  # Firebase Core
  firebase_core: ^3.15.2
  
  # Firebase Authentication
  firebase_auth: ^5.7.0
  
  # Firebase Database
  cloud_firestore: ^5.6.12
  
  # Firebase Storage
  firebase_storage: ^12.4.0
  flutter_animate: ^4.5.2
  lottie: ^3.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
