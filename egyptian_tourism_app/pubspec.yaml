name: egyptian_tourism_app
description: "Egyptian Tourism E-Commerce App for tourists to explore and purchase Egyptian artifacts and souvenirs."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # UI & Styling
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  
  # State Management
  provider: ^6.1.1
  
  # Navigation
  go_router: ^14.2.0

  # Utilities (Cloudinary)
  http: ^1.2.1
  image_picker: ^1.1.2
  shared_preferences: ^2.2.2
  
  # Icons
  cupertino_icons: ^1.0.8
  iconsax: ^0.0.8
  
  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  
  # Utilities
  intl: ^0.20.2
  smooth_page_indicator: ^1.1.0
  flutter_markdown: ^0.7.6
  
  # Firebase Core
  firebase_core: ^3.15.2
  
  # Firebase Authentication
  firebase_auth: ^5.7.0
  google_sign_in: ^6.2.2
  flutter_facebook_auth: ^7.0.0
  
  # Firebase Database
  cloud_firestore: ^5.6.12
  
  # Firebase Messaging
  firebase_messaging: ^15.0.1
  flutter_local_notifications: ^17.2.1
  
  # HTTP Client & Maps
  geolocator: ^10.1.0
  url_launcher: ^6.2.0
  
  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.5
  animated_notch_bottom_bar: ^1.0.4
  google_maps_flutter: ^2.16.0
  web_socket_channel: ^3.0.3
  auto_size_text: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.jpg"
  min_sdk_android: 21
  adaptive_icon_background: "#1A5F52"
  adaptive_icon_foreground: "assets/images/icon.jpg"

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
