name: bazaar_owner_app
description: "Bazaar Owner Application for managing products and orders."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # UI & Styling
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  
  # State Management
  provider: ^6.1.1
  
  # Icons
  cupertino_icons: ^1.0.8
  iconsax: ^0.0.8
  
  # Utilities
  intl: ^0.20.2
  http: ^1.2.1
  
  # Firebase Messaging
  firebase_messaging: ^15.0.1
  flutter_local_notifications: ^17.2.1
  
  # Firebase Core
  firebase_core: ^3.15.2
  
  # Firebase Authentication
  firebase_auth: ^5.7.0
  google_sign_in: ^6.2.2
  
  # Firebase Database
  cloud_firestore: ^5.6.12
  
  # Firebase Storage
  firebase_storage: ^12.4.0
  
  # Image Picker
  image_picker: ^1.1.2
  
  # QR Code Scanner
  mobile_scanner: ^3.5.5
  qr_flutter: ^4.1.0
  
  # Charts for dashboard
  fl_chart: ^0.65.0
  
  # Bottom Navigation Bar
  salomon_bottom_bar: ^3.3.2
  animated_bottom_navigation_bar: ^1.3.3
  
  # PDF & Excel Reports
  pdf: ^3.10.7
  excel: ^4.0.3
  path_provider: ^2.1.2
  share_plus: ^7.2.2
  open_file: ^3.3.2
  animated_text_kit: ^4.3.0
  flutter_staggered_animations: ^1.1.1
  path: ^1.9.1

  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
